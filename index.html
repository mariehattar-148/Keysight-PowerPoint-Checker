<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Keysight PowerPoint Brand Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--ks-red:#E90029;--ks-hover:#c9001f;--green:#1E8449;--amber:#B7950B;--navy:#1A5276;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f2f3f4;color:#111;min-height:100vh;}
.hdr{background:#000;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-sub{font-size:11px;color:#97999B;letter-spacing:.08em;}
#newFileBtn{display:none;margin-left:auto;background:transparent;border:1px solid #555;color:#ccc;border-radius:4px;padding:5px 14px;cursor:pointer;font-size:12px;font-family:Arial,sans-serif;}
#newFileBtn:hover{border-color:#aaa;color:#fff;}
.wrap{max-width:1040px;margin:0 auto;padding:24px 16px;}
.upload-zone{border:2px dashed #bbb;border-radius:10px;padding:60px 40px;text-align:center;cursor:pointer;background:#fff;transition:all .2s;user-select:none;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--ks-red);background:#fff5f5;}
.upload-icon{font-size:52px;margin-bottom:14px;}
.upload-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.upload-sub{color:#97999B;margin-bottom:20px;}
.btn-red{display:inline-block;background:var(--ks-red);color:#fff;padding:11px 32px;border-radius:4px;font-size:14px;font-weight:600;letter-spacing:1px;border:none;cursor:pointer;font-family:Arial,sans-serif;}
.btn-red:hover{background:var(--ks-hover);}
.upload-hint{margin-top:14px;font-size:12px;color:#97999B;}
.tags{margin-top:12px;display:flex;justify-content:center;flex-wrap:wrap;gap:7px;}
.tag{font-size:11px;background:#f0f0f0;color:#555;padding:3px 10px;border-radius:12px;}
.err-box{margin-top:12px;background:#fdedec;border:1px solid #e57373;border-radius:6px;padding:10px 16px;color:#C0392B;font-size:14px;display:none;}
.loading-box{background:#fff;border-radius:10px;padding:60px 40px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.07);display:none;}
.loading-icon{font-size:52px;margin-bottom:16px;}
.loading-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.loading-sub{color:#97999B;margin-bottom:28px;font-size:14px;}
.progress-bar{width:50%;height:5px;background:#f0f0f0;border-radius:3px;margin:0 auto;overflow:hidden;}
.progress-fill{height:100%;background:var(--ks-red);border-radius:3px;transition:width .8s ease;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%,100%{opacity:1;}50%{opacity:.55;}}
.results-section{display:none;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:640px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
.card{border-radius:8px;padding:14px 16px;}
.card-icon{font-size:22px;margin-bottom:4px;}
.card-label{font-size:12px;color:#666;margin-bottom:2px;}
.card-status{font-weight:700;font-size:17px;letter-spacing:1px;}
.card-detail{font-size:11px;color:#888;margin-top:4px;}
.action-bar{background:#fff;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.action-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-docx{background:var(--ks-red);color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:13px;font-family:Arial,sans-serif;}
.btn-docx:hover{background:var(--ks-hover);}
.btn-dl-fix{background:var(--navy);color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:13px;font-family:Arial,sans-serif;}
.btn-dl-fix:hover{background:#154360;}
.fix-toolbar{background:#fff;border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid var(--green);}
.fix-toolbar-label{font-size:13px;font-weight:700;color:#333;white-space:nowrap;}
.btn-sel-all{background:#f0f0f0;color:#333;border:1px solid #ccc;border-radius:4px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:Arial,sans-serif;white-space:nowrap;}
.btn-sel-all:hover{background:#e0e0e0;}
.fix-count{font-size:13px;color:#555;flex:1;min-width:150px;}
.btn-apply{background:var(--green);color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;font-weight:700;font-size:13px;font-family:Arial,sans-serif;white-space:nowrap;}
.btn-apply:disabled{opacity:0.35;cursor:not-allowed;}
.btn-apply:not(:disabled):hover{background:#176139;}
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;}
.ftab{padding:5px 14px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:Arial,sans-serif;}
.slide-list{display:flex;flex-direction:column;gap:6px;}
.slide-item{border-radius:8px;background:#fff;overflow:hidden;}
.slide-row{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}
.slide-num{background:#111;color:#fff;min-width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.slide-info{flex:1;min-width:0;}
.slide-title-text{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slide-issue-count{font-size:11px;color:#888;margin-top:2px;}
.cat-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.cbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.status-badge{font-weight:700;font-size:12px;flex-shrink:0;min-width:72px;text-align:right;}
.arrow{color:#aaa;font-size:11px;flex-shrink:0;}
.issues-panel{padding:14px;border-top:1px solid #eee;}
.no-issues{color:var(--green);font-weight:600;font-size:14px;}
.issue-card{margin-bottom:10px;border-radius:6px;overflow:hidden;border:1px solid #eee;}
.issue-hdr{padding:7px 12px;display:flex;justify-content:space-between;align-items:center;}
.issue-hdr-left{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;}
.issue-hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sev-badge{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:700;}
.fix-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.fix-check:disabled{cursor:default;opacity:0.5;}
.applied-badge{color:var(--green);font-size:11px;font-weight:700;white-space:nowrap;}
.failed-badge{color:#C0392B;font-size:11px;font-weight:700;white-space:nowrap;}
.manual-lbl{font-size:10px;color:#888;font-style:italic;}
.issue-body{padding:10px 12px;}
.field-label{font-size:10px;color:#888;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;}
.current-val{padding:6px 10px;border-radius:0 4px 4px 0;font-size:13px;font-style:italic;color:#333;margin-bottom:8px;background:#f7f7f7;}
.suggest-val{background:#f0fdf4;border-left:3px solid var(--green);padding:6px 10px;border-radius:0 4px 4px 0;font-size:13px;color:#1E5631;}
.fix-banner{background:#d4edda;border:1px solid #c3e6cb;border-radius:6px;padding:10px 14px;font-size:13px;color:#155724;margin-bottom:12px;display:none;}
.fix-banner.err{background:#f8d7da;border-color:#f5c6cb;color:#721c24;}
.ai-notice{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px 14px;font-size:13px;color:#856404;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.ai-key-row{display:flex;gap:8px;align-items:center;}
.ai-key-input{border:1px solid #ccc;border-radius:4px;padding:5px 10px;font-size:12px;font-family:Arial,sans-serif;width:240px;}
.ai-key-btn{background:#856404;color:#fff;border:none;border-radius:4px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:Arial,sans-serif;}
.lt-status{border-radius:6px;padding:8px 14px;font-size:12px;margin-bottom:12px;}
.legend{margin-top:20px;padding:12px 16px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:12px;}
.legend-title{font-weight:700;margin-bottom:8px;color:#555;}
.legend-items{display:flex;flex-wrap:wrap;gap:8px;}
.legend-item{background:#f5f5f5;border-radius:6px;padding:4px 10px;}
.legend-item strong{font-weight:700;}
.legend-item span{color:#888;margin-left:6px;}
</style>
</head>

<script>
/* ══ BRAND CONSTANTS ══ */
const PRIMARY=new Set(['E90029','000000','FFFFFF','EBEBEB','D9D9D6','97999B','373A36','871518','FAFAFA','F5F5F5']);
const SECONDARY=new Set(['071D49','426DA9','9B26B6','FF6720','F2A900','63B1BC']);
const ALL_COLORS=new Set([...PRIMARY,...SECONDARY]);
const SKIP_COLORS=new Set(['FFFFFF','000000','FAFAFA','F5F5F5','EBEBEB']);
const ALLOWED_FONTS=['Arial','Inter','Heebo'];
const TEMPLATE_NAME='2026 Keysight Widescreen Template';
const KS_MARKERS=['Keysight End Wave','1Corp Preso','1_EAR Section','Corp Preso RS'];
const LOWER=new Set(['a','an','the','and','but','or','nor','for','so','yet','as','at','by','in','of','on','to','up','via','per','vs']);
const FOOTER_Y=5800000;
const MIN_FONT_PT=12;      // absolute minimum — anything below is an ERROR
const WARN_FONT_PT=16;     // Keysight Do's & Don'ts recommended minimum — below is WARNING
const LT_IGNORE=new Set([
  'Keysight','PathWave','Infiniium','AXIe','PXIe','UXR','MXR','EXR','NXA','VXG',
  'Truevolt','FieldFox','BenchVue','OpenTap','Quantifi','mmWave',
  'oscilloscope','oscilloscopes','multimeter','Gigahertz','Megahertz',
  'GHz','MHz','kHz','THz','dBm','dBc','MIMO','OFDM','OFDMA','beamforming'
]);

// Words that are legitimately ALL CAPS and must not be sentence-cased.
// Used by toSentenceCase and detectAllCapsIssues.
const KNOWN_CAPS=new Set([
  'HTML','HTTP','HTTPS','REST','JSON','CORS','PDF','XML','CSS','URL',
  'API','FTP','SSH','DNS','TCP','LAN','WAN','VPN','MIMO','OFDM','CDMA',
  'TDMA','WLAN','SSID','UUID','GUID','IEEE','ANSI','ISO',
  'USA','UK','EU','WHO','NATO','UN','FBI','CIA',
  'CEO','CFO','CTO','COO','EVP','SVP','VP','HR','AI',
  'Q1','Q2','Q3','Q4'   // fiscal quarters
]);

/* ══ STATE ══ */
let _results=null,_filter='all',_expanded=null;
let _aiUnavailable=false,_ltUnavailable=false;
let _selectedFixes=new Set(),_fixStates={},_showDownload=false;

/* ══ HELPERS ══ */
function cdist(h1,h2){
  const r=h=>[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
  const[r1,g1,b1]=r(h1),[r2,g2,b2]=r(h2);
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}
function checkColor(hex){
  const h=hex.toUpperCase();
  if(ALL_COLORS.has(h)) return 'ok';
  for(const b of ALL_COLORS) if(cdist(h,b)<22) return 'close';
  return 'bad';
}
function toChicago(t){
  if(!t?.trim()) return t;
  const toks=t.split(/(\s+)/),words=toks.filter(x=>/\S/.test(x));let wi=0;
  return toks.map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const f=wi===0,l=wi===words.length-1;wi++;
    const c=tok.replace(/[^a-zA-Z]/g,'').toLowerCase();
    // .toLowerCase() on slice(1) ensures "WHY" → "Why", not "WHY" → "WHY"
    return(f||l||!LOWER.has(c))?tok[0].toUpperCase()+tok.slice(1).toLowerCase():tok.toLowerCase();
  }).join('');
}
function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ LOCAL CHECKS ══ */

// Font size: scoped strictly to <a:rPr> to avoid false positives from spacing/other sz attributes
function detectFontSizeIssues(slideXML){
  const issues=[],seen=new Set();
  function check(sp,inTable){
    if(/type="(?:ftr|dt|sldNum)"/.test(sp)) return;
    if(!inTable){const ym=sp.match(/<a:off[^>]+y="(\d+)"/);if(ym&&parseInt(ym[1])>FOOTER_Y)return;}
    const text=[...sp.matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(m=>m[1]).join('').trim();
    if(!text) return;
    // KEY: only read sz from <a:rPr> opening tags — NOT from spcPts, sp3d, or other elements
    const rprTags=[...sp.matchAll(/<a:rPr\b([^>]*)>/g)];
    const szVals=rprTags.flatMap(function(m){
      if(m[1].includes('baseline=')) return []; // superscript/subscript — intentionally small
      const sm=m[1].match(/\bsz="(\d+)"/);
      return sm?[parseInt(sm[1])]:[];
    });
    if(!szVals.length) return;
    const minSz=Math.min(...szVals),pt=minSz/100;
    if(pt>0&&pt<WARN_FONT_PT){
      const key=Math.round(pt*10)+':'+text.slice(0,25);
      if(!seen.has(key)){
        seen.add(key);
        issues.push({pt,text:text.slice(0,80),isError:pt<MIN_FONT_PT});
      }
    }
  }
  let m;
  const spRe=/<p:sp\b[\s\S]*?<\/p:sp>/g;
  while((m=spRe.exec(slideXML))!==null) check(m[0],false);
  const gfRe=/<p:graphicFrame\b[\s\S]*?<\/p:graphicFrame>/g;
  while((m=gfRe.exec(slideXML))!==null){
    const tcRe=/<a:tc\b[\s\S]*?<\/a:tc>/g;let tc;
    while((tc=tcRe.exec(m[0]))!==null) check(tc[0],true);
  }
  return issues;
}

// Bevel detection (Do's & Don'ts: "bevels are not recommended")
function detectBevelIssues(slideXML){
  const issues=[];
  const spRe=/<p:sp\b[\s\S]*?<\/p:sp>/g;let m;
  while((m=spRe.exec(slideXML))!==null){
    if(/<a:bevelT\b/.test(m[0])||/<a:bevelB\b/.test(m[0])){
      const txt=[...m[0].matchAll(/<a:t[^>]*>([^<]+)<\/a:t>/g)].map(x=>x[1]).join('').trim();
      issues.push({shape:txt?'"'+txt.slice(0,40)+'"':'(unnamed shape)'});
    }
  }
  return issues;
}

const I_VERB_MAP={does:'do',has:'have',goes:'go',makes:'make',takes:'take',
  wants:'want',needs:'need',gets:'get',gives:'give',knows:'know',says:'say',
  sees:'see',feels:'feel',thinks:'think',runs:'run',comes:'come',brings:'bring',
  uses:'use',works:'work',plays:'play',looks:'look',seems:'seem',stays:'stay',
  keeps:'keep',finds:'find',shows:'show',leads:'lead',grows:'grow',tries:'try',
  starts:'start',stops:'stop',stands:'stand',falls:'fall',calls:'call',
  reads:'read',writes:'write',speaks:'speak',becomes:'become',remains:'remain',
  appears:'appear',provides:'provide',requires:'require',includes:'include',
  allows:'allow',enables:'enable',creates:'create',manages:'manage',
  supports:'support',handles:'handle',produces:'produce',serves:'serve',
  delivers:'deliver',performs:'perform',represents:'represent',
  identifies:'identify',determines:'determine',describes:'describe',
  considers:'consider',believes:'believe',agrees:'agree',chooses:'choose',
  decides:'decide',means:'mean',exists:'exist',matters:'matter',sounds:'sound'};

// Detect "I + third-person singular verb" subject-verb errors locally.
// LanguageTool's free tier misses many of these; this catches them without any API.
function detectSubjectVerbIssues(allTexts){
  const issues=[],seen=new Set();
  const SVA_RE=/\bI\s+([a-zA-Z]{2,}[sS])\b/g; // case-insensitive verb match
  for(const text of allTexts){
    let m;
    while((m=SVA_RE.exec(text))!==null){
      const verb=m[1].toLowerCase();  // normalise before map lookup
      if(!I_VERB_MAP[verb]) continue;
      const original='I '+verb;  // normalised form for reliable fix
      const key=original.toLowerCase();
      if(seen.has(key)) continue;
      seen.add(key);
      const i=m.index;
      const ctxBefore=text.slice(Math.max(0,i-25),i);
      const ctxAfter=text.slice(i+original.length,i+original.length+25);
      const context=(ctxBefore?'…'+ctxBefore:'')+'"'+original+'"'+(ctxAfter?ctxAfter+'…':'');
      issues.push({original,suggested:'I '+I_VERB_MAP[verb],
        reason:'"I" takes the base verb form, not third-person singular (-s/-es)',
        context});
    }
  }
  return issues;
}

// Sentence-case text: first word gets title-cased, all others go lowercase
// EXCEPT: words in KNOWN_CAPS (real acronyms) and digit-prefixed tokens (Q4).
// This correctly lowercases common words like ARE, WHY, NOT, FINDING even in ALL CAPS.
function toSentenceCase(text){
  if(!text||!text.trim()) return text;
  return text.trim().split(/\s+/).map(function(w,i){
    if(/^\d/.test(w)) return w;                          // Q4, 2025, etc.
    if(KNOWN_CAPS.has(w)||LT_IGNORE.has(w)) return w;   // real acronyms: API, MHz, etc.
    if(i===0) return w[0].toUpperCase()+w.slice(1).toLowerCase(); // first word
    return w.toLowerCase();                               // everything else → lowercase
  }).join(' ');
}

// Return true if text is NOT in sentence case and should be flagged.
// Catches BOTH title case ("Quarterly Review") AND all-caps words ("WHY ARE we dating").
// Strategy: compare to sentence-cased version — any difference means a fix is needed.
function subtitleIsTitleCase(text){
  if(!text) return false;
  const words=text.trim().split(/\s+/);
  if(words.length<2) return false;
  const sc=toSentenceCase(text);
  // Only flag if the sentence-cased version actually differs
  return sc!==text;
}

// Detect body text bullets written in title case (should be sentence case).
// Works on the bullets[] array stored on each shape.
// True when 75%+ of alphabetic characters in a text are uppercase.
// Used to catch whole sentences written in ALL CAPS.
function isMostlyAllCaps(text){
  const letters=text.replace(/[^a-zA-Z]/g,'');
  if(letters.length<6) return false;
  return(letters.match(/[A-Z]/g)||[]).length/letters.length>0.75;
}

function detectBodyCaseIssues(shapes){
  const issues=[],seen=new Set();
  // These phrases must keep their exact capitalisation — never flag them
  const EXEMPT=[
    'keysight restricted','keysight confidential','keysight private',
    'restricted','confidential','private'
  ];
  for(const shape of shapes){
    // Skip titles and footers only.
    // Subtitle shapes (isSub=true) are deliberately included here so that
    // "WHY ARE we dating" in any placeholder — subtitle or body — gets caught.
    if(shape.isTitle||shape.isFtr) continue;
    for(const bullet of (shape.bullets||[])){
      const b=bullet.trim();
      if(b.length<8||seen.has(b.toLowerCase())) continue;
      const bLow=b.toLowerCase();
      // Skip Keysight classification phrases — keep exactly as entered
      if(EXEMPT.some(function(e){return bLow===e||bLow.includes(e);})) continue;
      const allCaps=isMostlyAllCaps(b);   // whole sentence in ALL CAPS
      const titleCased=subtitleIsTitleCase(b); // title case or other wrong casing
      if(allCaps||titleCased){
        seen.add(bLow);
        const reason=allCaps
          ?'ALL CAPS text \u2014 body text should use sentence case'
          :'Body text should use sentence case \u2014 only capitalise proper nouns (Keysight Do\u2019s & Don\u2019ts)';
        issues.push({original:b,suggested:toSentenceCase(b),reason:reason});
      }
    }
  }
  return issues;
}

function detectAllCapsIssues(shapes){
  const issues=[],seen=new Set();
  // Acceptable technical abbreviations that are always ALL CAPS in presentations
  const OK_CAPS=new Set(['HTML','HTTP','HTTPS','REST','JSON','CORS','PPTX','DOCX','XLSX',
    'PDF','XML','CSS','URL','API','FTP','SSH','DNS','TCP','LAN','WAN','VPN','MIMO',
    'OFDM','CDMA','TDMA','WLAN','SSID','UUID','GUID','IEEE','ANSI','ISO']);
  const CAPS_RE=/\b([A-Z]{4,})\b/g;
  for(const shape of shapes){
    // Skip title placeholders and ALL footer shapes.
    if(shape.isTitle||shape.isFtr) continue;
    // Check per bullet so we can skip bullets that are mostly all-caps
    // (those are flagged at sentence level by detectBodyCaseIssues instead)
    const bullets=shape.bullets&&shape.bullets.length>0?shape.bullets:[shape.text].filter(Boolean);
    for(const bullet of bullets){
      const bTxt=bullet.trim();
      if(!bTxt||isMostlyAllCaps(bTxt)) continue; // all-caps sentences handled elsewhere
      let m;
      while((m=CAPS_RE.exec(bTxt))!==null){
        const word=m[1];
        if(seen.has(word)) continue;
        if(LT_IGNORE.has(word)||OK_CAPS.has(word)||KNOWN_CAPS.has(word)) continue;
        if(/\d/.test(word)) continue;
        seen.add(word);
        const titleWord=word[0]+word.slice(1).toLowerCase();
        issues.push({original:word,suggested:titleWord,
          reason:'ALL CAPS \u2014 verify this is an intentional acronym. If not, use sentence or title case'});
      }
    }
  }
  return issues;
}

function extractSpText(sp){
  // Extract text paragraph-by-paragraph so words from different paragraphs
  // don't fuse together (e.g. "I" + "does" across paragraphs → "Idoes" bug).
  const paras=[...sp.matchAll(/<a:p\b[\s\S]*?<\/a:p>/g)];
  return paras.map(function(pm){
    return [...pm[0].matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(m=>m[1]).join('');
  }).filter(function(p){return p.trim();}).join(' ').replace(/\s+/g,' ').trim();
}

function parseSlideXML(xml){
  // hasCtrTitle is true only on "title slide" layouts (centered title + subtitle).
  // Regular content slides use type="title" and their body shapes must NOT be
  // mistaken for subtitles — they would then be excluded from the body case check.
  const hasCtrTitle=/type="ctrTitle"/.test(xml);
  const shapes=[],fonts=new Set(),colors=new Set();
  let subtitle=null;
  const spRe=/<p:sp\b[\s\S]*?<\/p:sp>/g;let sm;
  while((sm=spRe.exec(xml))!==null){
    const sp=sm[0];
    const isTitle=/type="(?:title|ctrTitle)"/.test(sp);
    // Footer: explicit type OR positioned in the bottom footer zone
    const yPos=parseInt((sp.match(/<a:off[^>]+y="(\d+)"/))||[,'0'])[1];
    const isFtr=/type="(?:ftr|dt|sldNum)"/.test(sp)||yPos>FOOTER_Y;
    // Subtitle detection: explicit subTitle type OR
    // on title-layout slides the second non-footer placeholder (body/undefined type)
    // that contains short text (< 200 chars) is the subtitle.
    const isExplicitSub=/type="subTitle"/.test(sp);
    const isSub=isExplicitSub||(!isTitle&&!isFtr&&hasCtrTitle&&subtitle===null);
    const txt=extractSpText(sp);
    if(txt){
      // Store individual bullets so detectBodyCaseIssues can check each line
      const bullets=[...sp.matchAll(/<a:p\b[\s\S]*?<\/a:p>/g)].map(function(pm){
        return[...pm[0].matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(function(r){return r[1];}).join('');
      }).filter(function(p){return p.trim().length>3;});
      // isFtr is stored so detectBodyCaseIssues/detectAllCapsIssues can skip footers
      shapes.push({isTitle,isSub:isSub&&!isTitle,isFtr,text:txt,bullets:bullets});
      // Take the first non-title non-footer text on a title-layout slide as subtitle
      if(isSub&&!isTitle&&!subtitle) subtitle=txt;
    }
    for(const f of sp.matchAll(/typeface="([^"]+)"/g)){const tf=f[1].trim();if(tf&&!tf.startsWith('+')&&!tf.startsWith('%'))fonts.add(tf);}
    for(const c of sp.matchAll(/<a:srgbClr\s+val="([A-Fa-f0-9]{6})"/g)) colors.add(c[1].toUpperCase());
  }
  for(const c of xml.matchAll(/<a:srgbClr\s+val="([A-Fa-f0-9]{6})"/g)) colors.add(c[1].toUpperCase());
  return{shapes,fonts:[...fonts],colors:[...colors],subtitle};
}

async function parsePPTX(file){
  const zip=await JSZip.loadAsync(file);
  window._zip=zip;window._slideFileMap={};window._slideXMLs={};
  const flist=Object.keys(zip.files);
  setProgress('&#128269;','Parsing Presentation','Checking template&#8230;',10);
  let templateOk=false,foundTheme='';
  for(const tf of flist.filter(f=>/ppt\/theme\/theme\d+\.xml/.test(f))){
    const xml=await zip.file(tf).async('text');
    const nm=xml.match(/name="([^"]+)"/);if(nm)foundTheme=nm[1];
    if(xml.includes(TEMPLATE_NAME)){templateOk=true;break;}
  }
  if(!templateOk){
    for(const lf of flist.filter(f=>/ppt\/slideLayouts\/slideLayout\d+\.xml/.test(f)).slice(0,8)){
      const xml=await zip.file(lf).async('text');
      if(KS_MARKERS.some(mk=>xml.includes(mk))){templateOk=true;break;}
    }
  }
  const slideFiles=flist.filter(f=>/^ppt\/slides\/slide\d+\.xml$/.test(f))
    .sort((a,b)=>parseInt(a.match(/\d+/)[0])-parseInt(b.match(/\d+/)[0]));
  const slides=[];
  for(let i=0;i<slideFiles.length;i++){
    setProgress('&#128269;','Parsing Presentation','Slide '+(i+1)+' of '+slideFiles.length+'&#8230;',10+Math.floor(i/slideFiles.length*30));
    const xml=await zip.file(slideFiles[i]).async('text');
    window._slideXMLs[slideFiles[i]]=xml;
    window._slideFileMap[i+1]=slideFiles[i];
    const{shapes,fonts,colors,subtitle}=parseSlideXML(xml);
    const tsShape=shapes.find(s=>s.isTitle);
    const body=shapes.filter(s=>!s.isTitle&&!s.isSub); // keeps subtitle out of body bullets
    const title=tsShape?.text||'';
    const badFonts=fonts.filter(f=>{
      const base=f.replace(/,.*$/,'').replace(/\s*(Bold|Italic|Regular|Light|Medium|SemiBold|Black|Heavy).*$/i,'').trim();
      return!ALLOWED_FONTS.some(af=>base.toLowerCase()===af.toLowerCase());
    });
    const colorIssues=colors.filter(c=>!SKIP_COLORS.has(c)).map(c=>({hex:c,st:checkColor(c)})).filter(c=>c.st==='bad');
    const fontSizeIssues=detectFontSizeIssues(xml);
    const bevelIssues=detectBevelIssues(xml);
    const sug=toChicago(title);
    // Run SVA on the full concatenated text too, in case "I does" spans shapes
    const allShapeTexts=shapes.map(s=>s.text);
    const svaIssues=detectSubjectVerbIssues(allShapeTexts.concat([allShapeTexts.join(' ')]));
    const bodyCaseIssues=detectBodyCaseIssues(shapes);
    const allCapsIssues=detectAllCapsIssues(shapes);
    slides.push({number:i+1,title,titleSug:sug!==title?sug:null,
      subtitle:subtitle||null,
      bodyText:body.map(s=>s.text),allText:shapes.map(s=>s.text), // allText includes subtitle
      fonts,badFonts,colorIssues,fontSizeIssues,bevelIssues,svaIssues,bodyCaseIssues,allCapsIssues});
  }
  return{templateOk,foundTheme,slides};
}

/* ══ LANGUAGETOOL SPELL CHECK ══ */
/* ══ LANGUAGETOOL — SPELLING + GRAMMAR (free, no API key needed) ══
   LanguageTool checks both spelling (TYPOS/MORFOLOGIK rules) and grammar
   (GRAMMAR, CONFUSED_WORDS, PUNCTUATION categories) in a single API call.
   ════════════════════════════════════════════════════════════════════════ */
async function runSpellCheck(slides){
  // Title uses textContent (not innerHTML) so write plain text — no &amp; entities
  setProgress('&#9999;','Spelling and Grammar Check',
    'Please wait about 30 seconds to 1 minute as the tool runs a spellcheck prior to opening.',44);

  const spellResults={};
  const ltGrammarResults={};

  const GRAMMAR_CATS=new Set([
    'GRAMMAR','CONFUSED_WORDS','PUNCTUATION','CASING','SEMANTICS','COLLOCATIONS'
  ]);
  // Use a proper Set so .has() is an exact match, not a substring search.
  const SKIP_RULES_SET=new Set([
    'WHITESPACE_RULE','UPPERCASE_SENTENCE_START','EN_QUOTES',
    'COMMA_PARENTHESIS_WHITESPACE','SENTENCE_FRAGMENT','TOO_LONG_SENTENCE',
    'EN_UNPAIRED_BRACKETS','COMMA_COMPOUND_SENTENCE_2','ENGLISH_WORD_REPEAT_BEGINNING_RULE'
  ]);

  for(const slide of slides){
    const texts=slide.allText.filter(t=>t.trim().length>1);
    if(!texts.length) continue;
    // Build combined text from text boxes (each ended with a period for LT).
    // Also build an offset map so we can find the ORIGINAL text box for each
    // LT match and extract clean context without artificial periods or newlines.
    const sentenceForms=texts.map(function(t){
      const s=t.trim();return /[.!?]$/.test(s)?s:s+'.';
    });
    const combined=sentenceForms.join('\n');
    // boxOffsets[i] = {start, end, original} in the combined string
    const boxOffsets=[];
    let bPos=0;
    for(let bi=0;bi<sentenceForms.length;bi++){
      boxOffsets.push({start:bPos,end:bPos+sentenceForms[bi].length,original:texts[bi].trim()});
      bPos+=sentenceForms[bi].length+1; // +1 for \n
    }
    // Map a match offset in combined → clean context from the original text box
    function srcContext(matchOffset,matchLen,word){
      for(const box of boxOffsets){
        if(matchOffset>=box.start&&matchOffset<box.end){
          const local=matchOffset-box.start;
          const orig=box.original; // no added period
          const bef=orig.slice(Math.max(0,local-30),local);
          const aft=orig.slice(local+word.length,local+word.length+30);
          return(local>30?'\u2026':'')+bef+'"'+word+'"'+aft+(local+word.length+30<orig.length?'\u2026':'');
        }
      }
      return'"'+word+'"';
    }
    try{
      const body=new URLSearchParams({
        text:combined,language:'en-US',
        disabledRules:[...SKIP_RULES_SET].join(',')
      });
      const res=await fetch('https://api.languagetool.org/v2/check',{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()
      });
      if(!res.ok) continue;
      const data=await res.json();
      const seenSpell=new Set(),seenGrammar=new Set();

      for(const match of (data.matches||[])){
        const word=combined.slice(match.offset,match.offset+match.length);
        if(!word||word.length<2) continue;
        const catId=match.rule?.category?.id||'';
        const ruleId=match.rule?.id||'';
        const isSpell=catId==='TYPOS'||ruleId.includes('MORFOLOGIK')||ruleId.includes('SPELL');
        const isGrammar=GRAMMAR_CATS.has(catId)&&!SKIP_RULES_SET.has(ruleId)&&!isSpell;

        // Context: map back to the original text box (no artificial periods/newlines)
        const contextSnippet=srcContext(match.offset,match.length,word);

        if(isSpell){
          if(LT_IGNORE.has(word)||LT_IGNORE.has(word.toLowerCase())) continue;
          if(/^[A-Z]{2,}$/.test(word)||/^\d/.test(word)) continue;
          if(seenSpell.has(word.toLowerCase())) continue;
          seenSpell.add(word.toLowerCase());
          const best=match.replacements?.[0]?.value||'(check spelling)';
          if(!spellResults[slide.number]) spellResults[slide.number]=[];
          spellResults[slide.number].push({
            original:word,suggested:best,reason:'Spelling error',
            context:contextSnippet
          });
        } else if(isGrammar){
          // Surface the issue even if LT has no replacement — user still needs to know
          const sugg=match.replacements?.[0]?.value||'(see grammar suggestion)';
          const key=ruleId+':'+word.toLowerCase().slice(0,20);
          if(seenGrammar.has(key)) continue;
          seenGrammar.add(key);
          if(!ltGrammarResults[slide.number]) ltGrammarResults[slide.number]=[];
          ltGrammarResults[slide.number].push({
            original:word,suggested:sugg,
            reason:(match.message||'Grammar issue')+' (LanguageTool)',
            context:contextSnippet
          });
        }
      }
    }catch(e){console.warn('LT failed slide',slide.number,':',e.message);_ltUnavailable=true;break;}
    if(slides.indexOf(slide)<slides.length-1)
      await new Promise(function(r){setTimeout(r,300);});
  }
  return{spellResults,ltGrammarResults};
}

Keysight Do's & Don'ts guidelines also require:

Slides data:

Return exactly this JSON:
{"slides":[{"slideNumber":1,"titleIssues":[{"original":"...","suggested":"...","reason":"..."}],"oxfordCommaIssues":[{"original":"...","suggested":"...","reason":"..."}],"bulletConsistencyIssues":[{"original":"...","suggested":"...","reason":"..."}],"grammarIssues":[{"original":"...","suggested":"...","reason":"..."}],"clarityIssues":[{"original":"...","suggested":"...","reason":"..."}]}]}
Only include slides with actual issues. Empty arrays for clean categories.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{

}

async function buildDOCX(R){
  const Z=window.JSZip,zip=new Z();
  function wp(text,{bold=false,color='000000',size=22,before=0,after=100,indent=0}={}){
    const b=bold?'<w:b/>':'';const c=color!=='000000'?'<w:color w:val="'+color+'"/>':'';
    const ind=indent?'<w:ind w:left="'+indent+'"/>':'';
    return'<w:p><w:pPr><w:spacing w:before="'+before+'" w:after="'+after+'"/>'+ind+'</w:pPr><w:r><w:rPr>'+b+c+'<w:sz w:val="'+size+'"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t xml:space="preserve">'+xe(text)+'</w:t></w:r></w:p>';
  }
  function div(){return'<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:color="E90029" w:space="1"/></w:pBdr><w:spacing w:before="140" w:after="140"/></w:pPr></w:p>';}
  function issBlock(issue){
    const sc={error:'C0392B',warning:'F39C12',info:'2471A3'}[issue.severity]||'555555';
    const sl={error:'ERROR',warning:'WARNING',info:'INFO'}[issue.severity];
    const cL={template:'Template',font:'Font',fontsize:'Font Size',color:'Color',bevel:'Bevel Effect',
      spelling:'Spelling',title:'Title Case',oxford:'Oxford Comma',bulletconsistency:'Bullet Consistency',
      grammar:'Grammar',clarity:'Clarity'}[issue.category]||issue.category;
    const origT=issue.message.replace(/^[^:]+:\s*/,'').replace(/^"|"$/g,'');
    const suggT=issue.suggestion.replace(/^"([^"]*)".*$/,'$1')||issue.suggestion;
    const reasonT=issue.suggestion.replace(/^"[^"]*"\s*[\u2014\-\u2013]\s*/,'')||'';
    return'<w:p><w:pPr><w:spacing w:before="160" w:after="40"/></w:pPr><w:r><w:rPr><w:b/><w:color w:val="'+sc+'"/><w:sz w:val="22"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t>'+xe(cL+' ['+sl+']')+'</w:t></w:r></w:p>'
      +wp('Current: '+origT,{color:'444444',size:20,indent:360,before:0,after:40})
      +wp('Suggested: '+suggT,{color:'1E5631',bold:true,size:20,indent:360,before:0,after:40})
      +(reasonT&&reasonT!==suggT?wp('Reason: '+reasonT,{color:'888888',size:18,indent:360,before:0,after:60}):'<w:p/>');
  }
  const stL={pass:'PASS',warn:'REVIEW',fail:'FAIL'};
  const stC={pass:'1E8449',warn:'B7950B',fail:'C0392B'};
  let sb='';

/* ══ FIX ENGINE ══
   ─────────────────────────────────────────────────────────────────────────────
   safeTextReplace: the ONLY text replacement function — replaces text content
   INSIDE <a:t> elements only. Never touches XML structure, run boundaries, or
   paragraph elements. This prevents the slide-blanking corruption that occurred
   when the previous applyTextReplace rebuilt paragraphs from scratch.
   ─────────────────────────────────────────────────────────────────────────────*/
function safeTextReplace(xml, original, suggested) {
  // Encode the replacement text for XML
  function encXML(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const origEnc = encXML(original);
  const suggEnc = encXML(suggested);

  return xml.replace(/<a:t([^>]*)>([^<]*)<\/a:t>/g, function(match, attrs, content) {
    // Try raw match first (most common: text stored unencoded in XML)
    if (content.includes(original)) {
      return '<a:t' + attrs + '>' + content.split(original).join(suggEnc) + '</a:t>';
    }
    // Try XML-encoded match (e.g. "Smith & Jones" stored as "Smith &amp; Jones")
    if (origEnc !== original && content.includes(origEnc)) {
      return '<a:t' + attrs + '>' + content.split(origEnc).join(suggEnc) + '</a:t>';
    }
    return match; // no match — leave entirely unchanged
  });
}

function nearestBrandColor(hex){let mn=Infinity,best=hex;for(const b of ALL_COLORS){const d=cdist(hex,b);if(d<mn){mn=d;best=b;}}return best;}

function applyFontFix(xml,fontName){
  let r=xml,s='typeface="'+fontName+'"';while(r.includes(s))r=r.replace(s,'typeface="Arial"');return r;
}
function applyColorFix(xml,badHex){
  const good=nearestBrandColor(badHex);let r=xml;
  for(const v of [badHex,badHex.toLowerCase(),badHex.toUpperCase()]){
    const s='<a:srgbClr val="'+v+'"',rep='<a:srgbClr val="'+good+'"';
    while(r.includes(s))r=r.replace(s,rep);
  }
  return r;
}
function applyFontSizeFix(xml){
  return xml.replace(/<p:sp\b[\s\S]*?<\/p:sp>/g,function(sp){
    if(/type="(?:ftr|dt|sldNum)"/.test(sp)) return sp;
    const ym=sp.match(/<a:off[^>]+y="(\d+)"/);
    if(ym&&parseInt(ym[1])>FOOTER_Y) return sp;
    return sp.replace(/<a:rPr\b([^>]*)>/g,function(tag,attrs){
      if(attrs.includes('baseline=')) return tag;
      const newAttrs=attrs.replace(/\bsz="(\d+)"/,function(_,v){
        const n=parseInt(v);return(n>0&&n<1400)?'sz="1400"':'sz="'+v+'"';
      });
      return'<a:rPr'+newAttrs+'>';
    });
  });
}
function applyTitleCaseFix(xml,original,suggested){
  if(original.length!==suggested.length) return xml;
  return xml.replace(/<p:sp\b[\s\S]*?<\/p:sp>/g,function(sp){
    if(!/type="(?:title|ctrTitle)"/.test(sp)) return sp;
    const texts=[...sp.matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(m=>m[1]);
    if(texts.join('')!==original) return sp;
    let pos=0;
    return sp.replace(/<a:t([^>]*)>([^<]*)<\/a:t>/g,function(_,a,t){
      const n=suggested.slice(pos,pos+t.length);pos+=t.length;
      return'<a:t'+a+'>'+n+'</a:t>';
    });
  });
}

/* ── applyMultiRunCaseFix ────────────────────────────────────────────────────
   Case-change fixes (bodycase, subtitle) often fail with safeTextReplace
   because "WHY ARE we dating" can be stored in several <a:r> runs — each word
   or phrase in its own run — so no single <a:t> contains the full phrase.
   This function distributes the suggested characters position-by-position
   across every run in the paragraph, which is safe because case changes
   never alter the string length (character count stays identical).
   ─────────────────────────────────────────────────────────────────────────── */
function applyMultiRunCaseFix(xml, original, suggested) {
  // Fast path: single <a:t> already contains the whole phrase (one run)
  const fast = safeTextReplace(xml, original, suggested);
  if (fast !== xml) return fast;

  // Only works for case changes (length-preserving substitutions)
  if (original.length !== suggested.length) return xml;

  return xml.replace(/<a:p\b[\s\S]*?<\/a:p>/g, function(pBlock) {
    const rms = [...pBlock.matchAll(/<a:r\b[\s\S]*?<\/a:r>/g)];
    if (!rms.length) return pBlock;

    // Build position map: each run's text and its start offset in combined text
    const infos = [];
    let pos = 0;
    for (const rm of rms) {
      const t = rm[0].match(/<a:t[^>]*>([^<]*)<\/a:t>/);
      const text = t ? t[1] : '';
      infos.push({orig: rm[0], text: text, start: pos, index: rm.index});
      pos += text.length;
    }
    const combined = infos.map(function(r){return r.text;}).join('');
    const si = combined.indexOf(original);
    if (si === -1) return pBlock;
    const ei = si + original.length;

    // Apply suggested characters to each run that overlaps [si, ei).
    // Process back-to-front so character positions stay valid as we rebuild.
    let result = pBlock;
    for (let i = infos.length - 1; i >= 0; i--) {
      const r = infos[i];
      const rEnd = r.start + r.text.length;
      if (rEnd <= si || r.start >= ei) continue; // not in replacement zone

      const localStart = Math.max(r.start, si) - r.start;
      const localEnd   = Math.min(rEnd,   ei)  - r.start;
      const suggStart  = Math.max(r.start, si) - si;
      const suggEnd    = Math.min(rEnd,   ei)  - si;

      const newText = r.text.slice(0, localStart)
                    + suggested.slice(suggStart, suggEnd)
                    + r.text.slice(localEnd);
      const enc = newText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const newRun = r.orig.replace(/<a:t([^>]*)>[^<]*<\/a:t>/, '<a:t$1>'+enc+'</a:t>');
      result = result.slice(0, r.index) + newRun + result.slice(r.index + r.orig.length);
    }
    return result;
  });
}
function applyOneFix(slideNum,issue){
  const fname=window._slideFileMap[slideNum];if(!fname) return false;
  const origXml=window._slideXMLs[fname]; // save to detect if fix actually changed anything
  let xml=origXml;
  try{
    if(issue.category==='font'){
      const m=issue.message.match(/Font: "([^"]+)"/);if(!m)return false;
      xml=applyFontFix(xml,m[1]);
    }else if(issue.category==='color'){
      const m=issue.message.match(/#([A-Fa-f0-9]{6})/);if(!m)return false;
      xml=applyColorFix(xml,m[1].toUpperCase());
    }else if(issue.category==='fontsize'){
      xml=applyFontSizeFix(xml);
    }else if(issue.category==='title'){
      const om=issue.message.match(/Title: "([^"]+)"/),sm=issue.suggestion.match(/^"([^"]+)"/);
      if(!om||!sm)return false;
      xml=applyTitleCaseFix(xml,om[1],sm[1]);
    }else if(issue.category==='subtitle'){
      const om=issue.message.match(/Subtitle: "([^"]+)"/),sm=issue.suggestion.match(/^"([^"]+)"/);
      if(!om||!sm)return false;
      xml=applyMultiRunCaseFix(xml,om[1],sm[1]); // multi-run: text often split across runs
    }else if(issue.category==='bodycase'){
      // Replace title-cased body text with sentence-cased version
      const om=issue.message.match(/Body Text: "([^"]+)"/),sm=issue.suggestion.match(/^"([^"]+)"/);
      if(!om||!sm)return false;
      xml=applyMultiRunCaseFix(xml,om[1],sm[1]); // multi-run: text often split across runs
    }else if(issue.category==='allcaps'){
      // Replace ALL CAPS word with title-cased version
      const om=issue.message.match(/ALL CAPS: "([^"]+)"/),sm=issue.suggestion.match(/^"([^"]+)"/);
      if(!om||!sm)return false;
      xml=safeTextReplace(xml,om[1],sm[1]);
    }else if(['spelling','grammar','clarity','oxford','bulletconsistency'].includes(issue.category)){
      const om=issue.message.match(/"([^"]+)"/),sm=issue.suggestion.match(/^"([^"]+)"/);
      if(!om||!sm)return false;
      const orig=om[1],sugg=sm[1];
      // Block placeholder suggestions — nothing meaningful to replace
      if(sugg==='(see grammar suggestion)'||sugg.startsWith('(see')) return false;
      // Approach 1: fast single-run replacement
      xml=safeTextReplace(xml,orig,sugg);
      // Approach 2: multi-run for same-length (e.g. "grate"→"great" split across runs)
      if(xml===origXml&&orig.length===sugg.length){
        xml=applyMultiRunCaseFix(xml,orig,sugg);
      }
      // Approach 3: word-boundary regex fallback — catches edge cases where the
      // word is embedded in text that the first two approaches missed
      if(xml===origXml){
        const esc=orig.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        const enc=sugg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const wbRe=new RegExp('\\b'+esc+'\\b','g');
        xml=xml.replace(/<a:t([^>]*)>([^<]*)<\/a:t>/g,function(m,attrs,content){
          const fixed=content.replace(wbRe,enc);
          return fixed!==content?'<a:t'+attrs+'>'+fixed+'<\/a:t>':m;
        });
      }
    }else{
      return false;
    }
    if(xml===origXml) return false; // nothing found/changed — report as failed, not silently OK
    window._slideXMLs[fname]=xml;return true;
  }catch(e){console.error('fix err:',e);return false;}
}

/* ══ FIX SELECTION ══ */
// Single source of truth for "can this issue be auto-fixed?"
// Used by countFixable, selectAllFixes, and renderResults (canFix).
function isAutoFixable(issue){
  // template, bevel: structural changes requiring manual editing
  // spelling: auto-replacement is unreliable (text split across runs, encoding issues)
  //           — flagged for awareness, corrected manually in PowerPoint
  if(['template','bevel','spelling'].includes(issue.category)) return false;
  if(issue.suggestion&&issue.suggestion.includes('(see grammar suggestion)')) return false;
  return true;
}
function countFixable(){
  let n=0;for(const s of(_results?.slides||[]))
    s.issues.forEach(function(i,idx){
      if(isAutoFixable(i)&&_fixStates[s.number+':'+idx]!=='applied') n++;
    });
  return n;
}
function selectAllFixes(){
  const keys=[];
  for(const s of(_results?.slides||[]))
    s.issues.forEach(function(i,idx){
      const k=s.number+':'+idx;
      // Use same isAutoFixable logic as countFixable — prevents "11 of 10 selected" mismatch
      if(isAutoFixable(i)&&_fixStates[k]!=='applied')keys.push(k);
    });
  const allSel=keys.length>0&&keys.every(function(k){return _selectedFixes.has(k);});
  if(allSel){_selectedFixes.clear();}else{keys.forEach(function(k){_selectedFixes.add(k);});}
  document.querySelectorAll('.fix-check').forEach(function(cb){
    if(!cb.disabled){
      const id=cb.id.replace('fix-','');const p=id.lastIndexOf('-');
      const k=id.slice(0,p)+':'+id.slice(p+1);cb.checked=_selectedFixes.has(k);
    }
  });
  updateFixBar();
}
function toggleFix(sn,ii,checked){const k=sn+':'+ii;if(checked)_selectedFixes.add(k);else _selectedFixes.delete(k);updateFixBar();}
function updateFixBar(){
  const cnt=_selectedFixes.size,fixable=countFixable();
  const allSel=fixable>0&&cnt>=fixable;
  const sab=document.getElementById('selAllBtn');if(sab)sab.textContent=allSel?'Deselect All':'Select All ('+fixable+')';
  const fc=document.getElementById('fixCount');if(fc)fc.textContent=cnt>0?cnt+' of '+fixable+' selected':'Tick checkboxes or use Select All';
  const ab=document.getElementById('applyBtn');if(ab){ab.disabled=cnt===0;ab.textContent='Apply '+(cnt>0?cnt+' ':'')+'Fix'+(cnt!==1?'es':'');}
}
async function applySelectedFixes(){
  const btn=document.getElementById('applyBtn');if(btn)btn.disabled=true;
  let ok=0,fail=0;
  for(const key of _selectedFixes){
    const[sn,ii]=[parseInt(key.split(':')[0]),parseInt(key.split(':')[1])];
    const slide=(_results?.slides||[]).find(function(s){return s.number===sn;});
    if(!slide||!slide.issues[ii]){_fixStates[key]='failed';fail++;continue;}
    const success=applyOneFix(sn,slide.issues[ii]);
    _fixStates[key]=success?'applied':'failed';if(success)ok++;else fail++;
  }
  _selectedFixes.clear();if(ok>0)_showDownload=true;
  renderResults();
  const b=document.getElementById('fixBanner');
  if(b){
    b.textContent=ok>0?ok+' fix'+(ok!==1?'es':'')+' applied.'+(fail>0?' '+fail+' could not be auto-applied.':'')+' Download the corrected file below.'
      :'No fixes could be applied automatically.';
    b.className='fix-banner'+(ok===0?' err':'');b.style.display='block';
  }
}
async function downloadFixed(){
  const zip=window._zip;if(!zip)return;
  for(const[fn,xml] of Object.entries(window._slideXMLs))zip.file(fn,xml);
  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
  const base=(_results?.file||'presentation').replace(/\.(pptx|potx)$/i,'');
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download=base+'-Keysight-Fixed.pptx';a.click();URL.revokeObjectURL(url);
}

async function runAnalysis(file){
  show('loadingSection');hide('uploadSection');hide('resultsSection');
  document.getElementById('newFileBtn').style.display='none';
  _results=null;_filter='all';_expanded=null;
  _selectedFixes=new Set();_fixStates={};_showDownload=false;_ltUnavailable=false;
  try{
    const{templateOk,foundTheme,slides}=await parsePPTX(file);
    const{spellResults,ltGrammarResults}=await runSpellCheck(slides);
    const aiSlides=await aiAnalyze(slides);
    setProgress('&#129302;','Building Report','Compiling findings&#8230;',92);
    const finalSlides=slides.map(function(slide){
      const ai=aiSlides.find(function(a){return a.slideNumber===slide.number;})||{};
      const ltSpell=spellResults[slide.number]||[];
      const ltGrammar=ltGrammarResults[slide.number]||[];
      const issues=[];
      if(slide.number===1&&!templateOk)issues.push({category:'template',severity:'error',
        message:'Template: "'+(foundTheme||'Not detected')+'"',
        suggestion:'"2026 Keysight Widescreen Template" \u2014 Apply Keysight_JAN26_WHITE or Keysight_FEB26_BLACK template'});
      slide.badFonts.forEach(function(f){issues.push({category:'font',severity:'error',
        message:'Font: "'+f+'"',
        suggestion:'"Arial, Inter, or Heebo" \u2014 Arial, Inter, and Heebo are all approved for Keysight PowerPoint presentations.'});});
      slide.fontSizeIssues.forEach(function(fs){issues.push({category:'fontsize',severity:fs.isError?'error':'warning',
        message:'Font Size: '+fs.pt+'pt in "'+fs.text.slice(0,50)+(fs.text.length>50?'\u2026':'')+'"',
        suggestion:'"'+( fs.isError?'12':'16')+'pt minimum" \u2014 '+(fs.isError?'Text below 12pt is an error. ':'')+'Keysight Do\u2019s & Don\u2019ts: minimum 16pt for presented slides'});});
      slide.bevelIssues.forEach(function(bv){issues.push({category:'bevel',severity:'warning',
        message:'Bevel effect on '+bv.shape,
        suggestion:'Remove the bevel \u2014 Keysight Do\u2019s & Don\u2019ts: "bevels are not recommended"'});});
      slide.colorIssues.forEach(function(c){const nearest=nearestBrandColor(c.hex);
        issues.push({category:'color',severity:'warning',
          message:'Color: "#'+c.hex+'" is not a Keysight brand color',
          suggestion:'Replace with #'+nearest+' \u2014 Use #E90029 Red (R:233 G:0 B:41) or approved palette'});});
      // Subject-verb agreement (local check — catches "I does/has/goes" etc.)
      (slide.svaIssues||[]).forEach(function(sv){issues.push({category:'grammar',severity:'error',
        message:'Grammar: "'+sv.original+'"'+(sv.context?' — '+sv.context:''),
        suggestion:'"'+sv.suggested+'" \u2014 '+sv.reason});});
      // Body text sentence case (each bullet that looks like title case)
      (slide.bodyCaseIssues||[]).forEach(function(bc){issues.push({category:'bodycase',severity:'warning',
        message:'Body Text: "'+bc.original+'"',
        suggestion:'"'+bc.suggested+'" \u2014 '+bc.reason});});
      // ALL CAPS words in body text
      (slide.allCapsIssues||[]).forEach(function(ac){issues.push({category:'allcaps',severity:'warning',
        message:'ALL CAPS: "'+ac.original+'"',
        suggestion:'"'+ac.suggested+'" \u2014 '+ac.reason});});
      // Subtitle sentence case
      if(slide.subtitle&&subtitleIsTitleCase(slide.subtitle)){
        const sc=toSentenceCase(slide.subtitle);
        if(sc!==slide.subtitle) issues.push({category:'subtitle',severity:'warning',
          message:'Subtitle: "'+slide.subtitle+'"',
          suggestion:'"'+sc+'" \u2014 Subtitles use sentence case (capitalise first word only; acronyms stay uppercase)'});
      }
      ltSpell.forEach(function(sp){issues.push({category:'spelling',severity:'error',
        message:'Spelling: "'+sp.original+'"'+(sp.context?' — '+sp.context:''),
        suggestion:'"'+sp.suggested+'" \u2014 Spelling error (LanguageTool)'});});
      (ai.titleIssues||[]).forEach(function(i){issues.push({category:'title',severity:'error',
        message:'Title: "'+i.original+'"',suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      if(!(ai.titleIssues&&ai.titleIssues.length)&&slide.titleSug)
        issues.push({category:'title',severity:'warning',
          message:'Title: "'+slide.title+'"',
          suggestion:'"'+slide.titleSug+'" \u2014 Chicago Manual of Style (17th ed.)'});
      (ai.oxfordCommaIssues||[]).forEach(function(i){issues.push({category:'oxford',severity:'error',
        message:'Oxford Comma: "'+i.original+'"',suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      (ai.bulletConsistencyIssues||[]).forEach(function(i){issues.push({category:'bulletconsistency',severity:'warning',
        message:'Bullet Punctuation: "'+i.original+'"',suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      (ai.grammarIssues||[]).forEach(function(i){issues.push({category:'grammar',severity:'error',
        message:'Grammar: "'+i.original+'"',suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      ltGrammar.forEach(function(i){issues.push({category:'grammar',severity:'error',
        message:'Grammar: "'+i.original+'"'+(i.context?' — '+i.context:''),
        suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      (ai.clarityIssues||[]).forEach(function(i){issues.push({category:'clarity',severity:'info',
        message:'Clarity: "'+i.original+'"',suggestion:'"'+i.suggested+'" \u2014 '+i.reason});});
      const status=issues.some(function(i){return i.severity==='error';})?'fail':issues.length?'warn':'pass';
      return Object.assign({},slide,{issues:issues,status:status});
    });
    const hasContent=aiSlides.some(function(a){
      return((a.titleIssues||[]).length+(a.oxfordCommaIssues||[]).length+(a.grammarIssues||[]).length)>0;
    });
    const hasSpell=Object.values(spellResults).some(function(a){return a.length>0;})
      ||Object.values(ltGrammarResults).some(function(a){return a.length>0;});
    _results={
      file:file.name,totalSlides:finalSlides.length,
      totalIssues:finalSlides.reduce(function(a,s){return a+s.issues.length;},0),
      templateOk:templateOk,foundTheme:foundTheme,slides:finalSlides,
      ltUsed:!_ltUnavailable,
      summary:{
        template:templateOk?'pass':'fail',
        fonts:finalSlides.some(function(s){return s.badFonts.length||s.fontSizeIssues.length;})?'fail':'pass',
        colors:finalSlides.some(function(s){return s.colorIssues.length||s.bevelIssues.length;})?'warn':'pass',
        content:(hasContent||hasSpell)?'fail':finalSlides.some(function(s){return s.issues.some(function(i){return i.category==='title'||i.category==='clarity';});})?'warn':'pass'
      }
    };
    hide('loadingSection');show('resultsSection');
    document.getElementById('newFileBtn').style.display='inline-block';
    renderResults();
  }catch(e){hide('loadingSection');show('uploadSection');showErr('Analysis failed: '+e.message);console.error(e);}
}

/* ══ RENDER ══ */
const stColors={pass:'#1E8449',warn:'#B7950B',fail:'#C0392B'};
const stBgs={pass:'#eafaf1',warn:'#fef9e7',fail:'#fdedec'};
const stLabel={pass:'\u2713 PASS',warn:'\u26A0 REVIEW',fail:'\u2717 FAIL'};
const catColors={template:'#6C3483',font:'#1A5276',fontsize:'#7D3C98',color:'#B7950B',bevel:'#884EA0',
  spelling:'#C0392B',title:'#1E8449',subtitle:'#117A65',bodycase:'#7D6608',allcaps:'#616A6B',
  oxford:'#2471A3',bulletconsistency:'#117A65',grammar:'#C0392B',clarity:'#117A65'};
const catIcons={template:'\uD83C\uDFD7',font:'\u24BB',fontsize:'\uD83D\uDD24',color:'\uD83C\uDFA8',bevel:'\u25B3',
  spelling:'\u270F',title:'T',subtitle:'Ss',bodycase:'Aa',allcaps:'AA',
  oxford:',',bulletconsistency:'\u2022',grammar:'\u270D',clarity:'\uD83D\uDCA1'};
const catLabelMap={template:'Template',font:'Font',fontsize:'Font Size',color:'Color',bevel:'Bevel Effect',
  spelling:'Spelling',title:'Title Case',subtitle:'Subtitle Case',bodycase:'Body Case',allcaps:'ALL CAPS',
  oxford:'Oxford Comma',bulletconsistency:'Bullet Consistency',grammar:'Grammar',clarity:'Clarity'};
const sevBgs={error:'#fdedec',warning:'#fef9e7',info:'#eaf4fb'};
const sevClrs={error:'#C0392B',warning:'#9A7D0A',info:'#1A5276'};

function renderResults(){
  const R=_results;
  const counts={all:R.slides.length,fail:R.slides.filter(function(s){return s.status==='fail';}).length,
    warn:R.slides.filter(function(s){return s.status==='warn';}).length,
    pass:R.slides.filter(function(s){return s.status==='pass';}).length};
  const filtered=R.slides.filter(function(s){return _filter==='all'||s.status===_filter;});
  const fixable=countFixable();const allSel=fixable>0&&_selectedFixes.size>=fixable;
  const cards=['template','fonts','colors','content'].map(function(key,i){
    const lbls=['Template','Fonts & Sizes','Colors & Effects','Content'];
    const dtls=['2026 Widescreen Template','Arial + min 16pt','14 colors, no bevels','Style, spelling, grammar'];
    const ics=['\uD83C\uDFD7','\uD83D\uDD24','\uD83C\uDFA8','\u270D'];
    const st=R.summary[key];const bg=stBgs[st]||'#f5f5f5',cl=stColors[st]||'#555';
    return'<div class="card" style="background:'+bg+';border:1px solid '+cl+'40">'
      +'<div class="card-icon">'+ics[i]+'</div><div class="card-label">'+lbls[i]+'</div>'
      +'<div class="card-status" style="color:'+cl+'">'+({pass:'PASS',warn:'REVIEW',fail:'FAIL'}[st]||st)+'</div>'
      +'<div class="card-detail">'+dtls[i]+'</div></div>';
  }).join('');
  const ftabs=['all','fail','warn','pass'].map(function(f){
    const cl={all:'#333',fail:'#C0392B',warn:'#B7950B',pass:'#1E8449'}[f];
    const lbl={all:'All',fail:'Fail',warn:'Review',pass:'Pass'}[f];
    const cnt={all:counts.all,fail:counts.fail,warn:counts.warn,pass:counts.pass}[f];
    const active=_filter===f;
    return'<button class="ftab" onclick="setFilter(\''+f+'\')" style="border:'+(active?'none':'1px solid '+cl+'50')+';background:'+(active?cl:'#fff')+';color:'+(active?'#fff':cl)+'">'+lbl+' ('+cnt+')</button>';
  }).join('');
  const slideCards=filtered.map(function(slide){
    const st=slide.status,bClr=stColors[st];const isOpen=_expanded===slide.number;
    const cats=[...new Set(slide.issues.map(function(i){return i.category;}))];
    const catBdgs=cats.map(function(cat){return'<span class="cbadge" style="background:'+catColors[cat]+'18;color:'+catColors[cat]+'">'+cat+'</span>';}).join('');
    let panel='';
    if(isOpen){
      if(!slide.issues.length){
        panel='<div class="issues-panel" style="border-top:1px solid '+bClr+'30"><div class="no-issues">\u2713 All checks passed.</div></div>';
      }else{
        const iCards=slide.issues.map(function(issue,idx){
          const key=slide.number+':'+idx;
          const sc=sevClrs[issue.severity]||'#555',sb=sevBgs[issue.severity]||'#f5f5f5';
          const sl={error:'ERROR',warning:'WARNING',info:'INFO'}[issue.severity];
          const cL=catLabelMap[issue.category]||issue.category,ci=catIcons[issue.category]||'\u2022';
          const origT=issue.message.replace(/^[^:]+:\s*/,'');
          const canFix=isAutoFixable(issue); // consistent with countFixable & selectAllFixes
          const isApplied=_fixStates[key]==='applied',isFailed=_fixStates[key]==='failed';
          let rightCtrl='';
          if(isApplied)rightCtrl='<span class="applied-badge">\u2713 Applied</span>';
          else if(isFailed)rightCtrl='<span class="failed-badge">\u2717 Manual fix needed</span>';
          else if(canFix)rightCtrl='<input type="checkbox" class="fix-check" id="fix-'+slide.number+'-'+idx+'" onchange="toggleFix('+slide.number+','+idx+',this.checked)" title="Include in batch fix"'+(_selectedFixes.has(key)?' checked':'')+'/>';
          else rightCtrl='<span class="manual-lbl">manual fix</span>';
          return'<div class="issue-card" style="border-color:'+sc+'25;'+(isApplied?'opacity:.6;':'')+'"><div class="issue-hdr" style="background:'+sb+'">'
            +'<div class="issue-hdr-left" style="color:'+sc+'">'+ci+' '+cL+'</div>'
            +'<div class="issue-hdr-right"><span class="sev-badge" style="background:'+sc+'">'+sl+'</span>'+rightCtrl+'</div></div>'
            +'<div class="issue-body"><div class="field-label">Current</div>'
            +'<div class="current-val" style="border-left:3px solid '+sc+'">'+origT+'</div>'
            +'<div class="field-label">Recommended Change</div>'
            +'<div class="suggest-val">'+issue.suggestion+'</div></div></div>';
        }).join('');
        panel='<div class="issues-panel" style="border-top:1px solid '+bClr+'30">'+iCards+'</div>';
      }
    }
    return'<div class="slide-item" style="border:1px solid '+bClr+'40">'
      +'<div class="slide-row" onclick="toggleSlide('+slide.number+')" style="background:'+(isOpen?stBgs[st]:'#fff')+'">'
      +'<div class="slide-num">'+slide.number+'</div>'
      +'<div class="slide-info"><div class="slide-title-text">'+(slide.title||'<span style="color:#aaa;font-style:italic">(No title)</span>')+'</div>'
      +(slide.issues.length?'<div class="slide-issue-count">'+slide.issues.length+' finding'+(slide.issues.length!==1?'s':'')+'</div>':'')
      +'</div><div class="cat-badges">'+catBdgs+'</div>'
      +'<div class="status-badge" style="color:'+bClr+'">'+stLabel[st]+'</div>'
      +'<div class="arrow">'+(isOpen?'\u25b2':'\u25bc')+'</div></div>'+panel+'</div>';
  }).join('');
  const issueClr=R.totalIssues>0?'#C0392B':'#1E8449';
  const ltBg=_ltUnavailable?'background:#f8d7da;border-color:#f5c6cb;color:#721c24':'background:#e8f4fd;border-color:#bee5eb;color:#0c5460';
  const ltMsg=_ltUnavailable?'\u26A0 Spell &amp; grammar check unavailable (LanguageTool could not be reached — network/firewall).':'\u2713 Spell &amp; grammar check: LanguageTool (api.languagetool.org) \u2014 free, no API key required';
  const aiNotice=''; // API key prompt removed — AI checks silently run when window._apiKey is set
  document.getElementById('resultsSection').innerHTML=
    '<div class="lt-status" style="'+ltBg+'">'+ltMsg+'</div>'
    +aiNotice
    +'<div id="fixBanner" class="fix-banner" style="display:none;"></div>'
    +'<div class="summary-grid">'+cards+'</div>'
    +'<div class="action-bar">'
    +'<div><span style="font-weight:700">'+R.file+'</span><span style="color:#97999B;margin:0 8px">|</span><span>'+R.totalSlides+' slides</span><span style="color:#97999B;margin:0 8px">|</span><span style="font-weight:600;color:'+issueClr+'">'+R.totalIssues+' finding'+(R.totalIssues!==1?'s':'')+' found</span></div>'
    +'<div class="action-btns">'
    +'<button class="btn-docx" onclick="buildDOCX(window._results)">\uD83D\uDCC4 Word Report</button>'
    +(_showDownload?'<button class="btn-dl-fix" onclick="downloadFixed()">\u2B07 Fixed .pptx</button>':'')
    +'</div></div>'
    +(R.totalIssues>0?'<div class="fix-toolbar">'
      +'<span class="fix-toolbar-label">Auto-Fix:</span>'
      +'<button class="btn-sel-all" id="selAllBtn" onclick="selectAllFixes()">'+(allSel?'Deselect All':'Select All ('+fixable+')')+'</button>'
      +'<span class="fix-count" id="fixCount">'+(_selectedFixes.size>0?_selectedFixes.size+' of '+fixable+' selected':'Tick checkboxes or use Select All')+'</span>'
      +'<button class="btn-apply" id="applyBtn" onclick="applySelectedFixes()"'+(_selectedFixes.size===0?' disabled':'')+'>Apply'+(_selectedFixes.size>0?' '+_selectedFixes.size:'')+' Fix'+(_selectedFixes.size!==1?'es':'')+'</button>'
      +(_showDownload?'<button class="btn-dl-fix" onclick="downloadFixed()">\u2B07 Fixed .pptx</button>':'')
      +'</div>':'')
    +'<div class="filter-tabs">'+ftabs+'</div>'
    +'<div class="slide-list">'+(slideCards||'<div style="text-align:center;padding:40px;color:#97999B">No slides match this filter.</div>')+'</div>'
    +'<div class="legend"><div class="legend-title">Checks (Brand Guidelines + Keysight Do\'s &amp; Don\'ts)</div><div class="legend-items">'
    +'<div class="legend-item"><strong>\uD83C\uDFD7 Template</strong><span>2026 Widescreen required</span></div>'
    +'<div class="legend-item"><strong>\u24BB Font</strong><span>Arial (PPT), Inter, Heebo</span></div>'
    +'<div class="legend-item"><strong>\uD83D\uDD24 Size</strong><span>16pt min recommended; 12pt hard minimum</span></div>'
    +'<div class="legend-item"><strong>\uD83C\uDFA8 Colors</strong><span>#E90029 Red + 13 others</span></div>'
    +'<div class="legend-item"><strong>\u25B3 Bevel</strong><span>Not recommended (Do\'s &amp; Don\'ts)</span></div>'
    +'<div class="legend-item"><strong>\u270F Spelling</strong><span>LanguageTool — no key needed</span></div>'
    +'<div class="legend-item"><strong>T Title Case</strong><span>Chicago Manual 17th ed.</span></div>'
    +'<div class="legend-item"><strong>Ss Subtitle</strong><span>Sentence case \u2014 first word only</span></div>'
    +'<div class="legend-item"><strong>Aa Body Case</strong><span>Bullets should use sentence case</span></div>'
    +'<div class="legend-item"><strong>AA ALL CAPS</strong><span>4+ uppercase letters flagged for review</span></div>'
    +'<div class="legend-item"><strong>, Oxford Comma</strong><span>Required in 3+ item lists</span></div>'
    +'<div class="legend-item"><strong>\u2022 Bullet Consistency</strong><span>Uniform punctuation per slide</span></div>'
    +'<div class="legend-item"><strong>\u270D Grammar</strong><span>LanguageTool (free) + AI when available</span></div>'
    +'<div class="legend-item"><strong>\uD83D\uDCA1 Clarity</strong><span>Keysight Writing Style Guide</span></div>'
    +'</div></div>';
  window._results=_results;
}

function toggleSlide(n){_expanded=_expanded===n?null:n;renderResults();}
function setFilter(f){_filter=f;renderResults();}

/* ══ UI ══ */
function setProgress(icon,title,sub,pct){
  document.getElementById('loadingIcon').innerHTML=icon;
  document.getElementById('loadingTitle').textContent=title;
  document.getElementById('loadingProgress').innerHTML=sub;
  document.getElementById('progressFill').style.width=pct+'%';
}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function showErr(msg){const b=document.getElementById('errBox');b.textContent=msg;b.style.display='block';}
function resetTool(){
  _results=null;_filter='all';_expanded=null;
  _selectedFixes=new Set();_fixStates={};_showDownload=false;_ltUnavailable=false;
  show('uploadSection');hide('loadingSection');hide('resultsSection');
  document.getElementById('newFileBtn').style.display='none';
  document.getElementById('errBox').style.display='none';
  document.getElementById('fileInput').value='';
}
function handleDrop(e){
  e.preventDefault();document.getElementById('dropZone').classList.remove('drag');
  const f=e.dataTransfer.files[0];if(f)processFile(f);
}
function handleFileInput(e){processFile(e.target.files[0]);}
function processFile(f){
  if(!f?.name.match(/\.(pptx|potx)$/i)){showErr('Please upload a .pptx or .potx file');return;}
  document.getElementById('errBox').style.display='none';
  window._lastFile=f;runAnalysis(f);
}
</script>
